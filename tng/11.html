<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./11.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- container : 검정색배경부분 -->
    <div class="container">
      <!-- title : 흰색 배경부분 -->
      <div class="title">
        <!-- div class="h1": 대학언론사 수습기자모집 문구작성 및 문구배경 -->
        <div class="h1-pizza">
          <span>대학언론사 수습기자 모집</span>
        </div>
        <!-- 신입생 여러분을 기다립니다 묶음 (무슨태그넣어야하더라 폰트) -->
        <div class="new-1">
          <h1><i>신입생 여러분을 기다립니다</i></h1>
        </div>
        <div class="h2-redtitle1">
          <h2>모집분야</h2>
          <ul>
            <li>아나운서(0명): 학내 소식을 라디오 방송으로 보도</li>
            <li>오프닝쇼프로듀서(0명):라디오 방송 기획, 제작</li>
            <li>엔지니어(0명): 라디오 방송 녹음 및 편집</li>
          </ul>
        </div>
        <div class="h2-redtitle2">
          <!-- h2-redtitle : 붉은색에 h2태그? -->
          <h2>혜택</h2>
          <!-- ul부분에 불릿제거 -->
          <ul>
            <li>수습기자 활동 중 소정의 활동비 지급</li>
            <li>정기자로 진급하면 장학금 지급</li>
          </ul>
        </div>
        <img src="../edu/mokhwa.jpg" alt="mokhwa" />
      </div>
    </div>
  </body>
</html>
